name: Sync DMRC Data

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Pull latest changes
        run: git pull origin main --rebase

      - name: Process Data
        run: python3 process_data.py

      - name: Commit and Push
        run: |
          git config --global user.name "MetroGuard Bot"
          git config --global user.email "bot@metroguard.com"
          git add config.json
          git diff --cached --quiet || git commit -m "Auto-update DMRC station data"
          git push origin main
