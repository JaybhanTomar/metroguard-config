name: Sync DMRC Data

on:
  schedule:
    - cron: '0 3 * * 1' # Runs every Monday at 3 AM
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Process Data
        run: python3 process_data.py

      - name: Commit and Push
        run: |
          git config --global user.name "MetroGuard Bot"
          git config --global user.email "bot@metroguard.com"
          git pull origin main --rebase
          git add config.json
          git commit -m "Auto-update DMRC station data" || echo "No changes to commit"
          git push origin main
